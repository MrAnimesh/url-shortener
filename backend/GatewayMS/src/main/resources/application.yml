server:
  port: 8081

app:
  user-token-check-url: ${USER_TOKEN_CHECK_URL:http://UserMS/api/v1/auth/verifytoken}

spring:
  profiles:
    default: local

  application:
    name: GatewayMS

  app:
    jwtSecret: ${JWT_SECRET}

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
      - id: UserMS
        uri: lb://USERMS
        predicates:
        - Path=/api/v1/auth/**, /api/v1/payments/**, /admin/workers/**, /admin/workers

      - id: SecurityMS
        uri: lb://SecurityMS
        predicates:
        - Path=/find

      - id: ShortnerMS
        uri: lb://ShortnerMS
        predicates:
        - Path=/api/v1/urls/**, /{shortCode}, /api/v1/qr/**
